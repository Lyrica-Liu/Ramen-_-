# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy to Azure Web App - Ramen

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Build React frontend
        run: |
          npm install
          npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Spring Boot JAR
        run: mvn package -DskipTests

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/app.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_39E24E9158474D7E85286028E73D49DC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1580C94001CE4265A79864B81C0B4736 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0B8C5DBCD34540F6BEF536FCD298485E }}

      - name: Configure App Service
        run: |
          az webapp config set \
            --resource-group resource \
            --name Ramen \
            --linux-fx-version "JAVA|17-java17"
          az webapp config appsettings set \
            --resource-group resource \
            --name Ramen \
            --settings WEBSITES_CONTAINER_START_TIME_LIMIT=600
          az webapp start \
            --resource-group resource \
            --name Ramen

      - name: Deploy JAR to Azure App Service
        run: |
          az webapp deploy \
            --resource-group resource \
            --name Ramen \
            --src-path app.jar \
            --type jar
          az webapp restart \
            --resource-group resource \
            --name Ramen
