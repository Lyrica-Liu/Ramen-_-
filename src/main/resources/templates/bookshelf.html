<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vocabulary Bookshelf</title>
    <link rel="stylesheet" href="/css/vocab.css" />
</head>
<body>
<div class="page-container">
    <header class="top-bar">
        <h1>Vocabulary Bookshelf</h1>
    </header>

    <main class="bookshelf">
        <div class="book-grid" id="bookGrid"></div>
        <button id="createBookBtn" class="create-book-btn">+ New Book</button>
    </main>

    <section class="bookshelf-guide user-guide">
        <h3>📘 Quick Start Guide</h3>
        <p>1️⃣ Click <strong>+ New Book</strong> to create your vocabulary book.</p>
        <p>2️⃣ Click a book to enter study mode and add words.</p>
        <p>3️⃣ Use <strong>Flash Cards</strong>, <strong>Spelling Game</strong>, and <strong>Statistics</strong> to review every day.</p>
        <p>🧠 Tip: Review a little every day for the best memory results.</p>
    </section>
</div>

<script src="/js/bookshelf.js"></script>
</body>
</html>
